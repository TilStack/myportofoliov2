<header class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__inner container">

    <!-- Logo -->
    <a routerLink="/" class="navbar__logo" (click)="closeMenu()" aria-label="Israel Tientcheu — Home">
      <img src="logo.svg" alt="IT logo" class="navbar__logo-img" />
    </a>

    <!-- Desktop nav -->
    <nav class="navbar__links" aria-label="Main navigation">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="navbar__link"
        >{{ i18n.t(link.key) }}</a>
      }
    </nav>

    <!-- Actions -->
    <div class="navbar__actions">
      <!-- Lang toggle -->
      <button class="navbar__action" (click)="i18n.toggleLang()" aria-label="Switch language">
        {{ i18n.lang() === 'en' ? 'FR' : 'EN' }}
      </button>

      <!-- Theme toggle -->
      <button class="navbar__action navbar__theme-btn" (click)="themeService.toggle()" aria-label="Toggle theme">
        @if (!themeService.isDark()) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>

      <!-- Burger (mobile) -->
      <button class="navbar__burger" [class.open]="menuOpen()" (click)="toggleMenu()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <nav class="navbar__mobile" [class.open]="menuOpen()" aria-label="Mobile navigation">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        class="navbar__mobile-link"
        (click)="closeMenu()"
      >{{ i18n.t(link.key) }}</a>
    }
  </nav>
</header>
